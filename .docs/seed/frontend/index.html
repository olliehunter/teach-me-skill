<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>teach-me bundling spike</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; max-width: 32rem; margin: 4rem auto; padding: 0 1rem; }
      #status { color: #6b6b6b; }
      button { font-size: 1rem; padding: .6rem 1rem; margin-top: 1rem; }
      input { font-size: 1rem; padding: .5rem; width: 100%; box-sizing: border-box; }
    </style>
  </head>
  <body>
    <h1>Sidecar voice spike</h1>
    <p id="status">Waiting for sidecar…</p>
    <input id="text" value="Hello — this voice is coming from a bundled local sidecar." />
    <button id="speak" disabled>Speak</button>
    <script>
      const PORT = 17861;
      const base = `http://127.0.0.1:${PORT}`;
      const statusEl = document.getElementById("status");
      const btn = document.getElementById("speak");

      // Poll /health until the bundled sidecar is up.
      async function waitForSidecar() {
        for (let i = 0; i < 120; i++) {
          try {
            const r = await fetch(`${base}/health`);
            if (r.ok) { statusEl.textContent = "Sidecar ready."; btn.disabled = false; return; }
          } catch (_) { /* not up yet */ }
          await new Promise((res) => setTimeout(res, 1000));
        }
        statusEl.textContent = "Sidecar did not start (check logs).";
      }

      btn.addEventListener("click", async () => {
        btn.disabled = true;
        statusEl.textContent = "Synthesizing…";
        const text = document.getElementById("text").value;
        try {
          const r = await fetch(`${base}/speak?text=${encodeURIComponent(text)}`);
          const blob = await r.blob();
          const audio = new Audio(URL.createObjectURL(blob));
          audio.onended = () => { statusEl.textContent = "Done."; btn.disabled = false; };
          await audio.play();
          statusEl.textContent = "Playing…";
        } catch (e) {
          statusEl.textContent = "Error: " + e;
          btn.disabled = false;
        }
      });

      waitForSidecar();
    </script>
  </body>
</html>
