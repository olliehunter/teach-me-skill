<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="800" height="450" fill="#0f1226"/>
  <text x="40" y="56" fill="#e8e8f0" font-size="26" font-weight="700">Four server types</text>
  <text x="40" y="86" fill="#8a90b8" font-size="16">How the bundle carries and runs its code</text>

  <g transform="translate(50,120)" font-size="13.5">
    <rect width="345" height="120" rx="12" fill="#1e2140" stroke="#7aa2f7" stroke-width="1.5"/>
    <text x="18" y="32" fill="#7aa2f7" font-size="15" font-weight="700">node</text>
    <text x="18" y="60" fill="#e8e8f0">JS server; deps bundled in</text>
    <text x="18" y="80" fill="#e8e8f0">node_modules</text>

    <rect x="365" width="345" height="120" rx="12" fill="#1e2140" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="383" y="32" fill="#6ee7b7" font-size="15" font-weight="700">python</text>
    <text x="383" y="60" fill="#e8e8f0">deps bundled in server/lib</text>
    <text x="383" y="80" fill="#e8e8f0">or server/venv</text>

    <rect y="135" width="345" height="120" rx="12" fill="#1e2140" stroke="#c9a227" stroke-width="1.5"/>
    <text x="18" y="167" fill="#c9a227" font-size="15" font-weight="700">binary</text>
    <text x="18" y="195" fill="#e8e8f0">pre-compiled, self-contained</text>
    <text x="18" y="215" fill="#e8e8f0">no runtime required</text>

    <rect x="365" y="135" width="345" height="120" rx="12" fill="#1e2140" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="383" y="167" fill="#a78bfa" font-size="15" font-weight="700">uv  (v0.4+)</text>
    <text x="383" y="195" fill="#e8e8f0">deps in pyproject.toml,</text>
    <text x="383" y="215" fill="#e8e8f0">host installs — ~100 KB bundle</text>
  </g>
  <text x="40" y="420" fill="#5b6091" font-size="12">Source: MCPB Manifest.json Spec (modelcontextprotocol/mcpb)</text>
</svg>
