<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="800" height="450" fill="#0f1226"/>
  <text x="40" y="56" fill="#e8e8f0" font-size="26" font-weight="700">The whole required contract</text>
  <text x="40" y="86" fill="#8a90b8" font-size="16">Two fields: name and description</text>

  <g transform="translate(60,115)">
    <rect width="680" height="270" rx="12" fill="#12152e" stroke="#3a3f6b" stroke-width="1.5"/>
    <rect width="680" height="34" rx="12" fill="#1e2140"/>
    <text x="16" y="23" fill="#8a90b8" font-size="13" font-family="ui-monospace, monospace">SKILL.md</text>
    <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="15">
      <text x="20" y="72" fill="#c9a227">---</text>
      <text x="20" y="98" fill="#7aa2f7">name<tspan fill="#e8e8f0">: my-skill-name</tspan></text>
      <text x="20" y="124" fill="#7aa2f7">description<tspan fill="#e8e8f0">: A clear description of what this</tspan></text>
      <text x="20" y="146" fill="#e8e8f0">             skill does and when to use it</text>
      <text x="20" y="172" fill="#c9a227">---</text>
      <text x="20" y="210" fill="#6ee7b7"># My Skill Name</text>
      <text x="20" y="238" fill="#8a90b8">Instructions Claude follows when the skill is active…</text>
    </g>
  </g>
  <text x="40" y="418" fill="#5b6091" font-size="12">Source: anthropics/skills template · Agent Skills Overview</text>
</svg>
