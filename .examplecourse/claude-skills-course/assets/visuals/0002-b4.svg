<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="800" height="450" fill="#0f1226"/>
  <text x="40" y="56" fill="#e8e8f0" font-size="26" font-weight="700">Level 2: the body, on trigger</text>
  <text x="40" y="86" fill="#8a90b8" font-size="16">Read from the filesystem via bash, only when relevant</text>

  <g font-size="14">
    <g transform="translate(60,140)">
      <rect width="200" height="120" rx="12" fill="#1e2140" stroke="#7aa2f7" stroke-width="1.5"/>
      <text x="100" y="40" fill="#7aa2f7" font-size="15" text-anchor="middle">request matches</text>
      <text x="100" y="64" fill="#e8e8f0" text-anchor="middle">a description</text>
      <text x="100" y="96" fill="#8a90b8" font-size="13" text-anchor="middle">"summarise this PDF"</text>
    </g>
    <text x="285" y="205" fill="#6ee7b7" font-size="26">→</text>
    <g transform="translate(330,140)">
      <rect width="200" height="120" rx="12" fill="#1e2140" stroke="#6ee7b7" stroke-width="2"/>
      <text x="100" y="40" fill="#6ee7b7" font-size="15" text-anchor="middle">bash reads</text>
      <text x="100" y="64" fill="#e8e8f0" text-anchor="middle">SKILL.md</text>
      <text x="100" y="96" fill="#8a90b8" font-size="13" text-anchor="middle">body enters context</text>
    </g>
    <text x="555" y="205" fill="#6ee7b7" font-size="26">→</text>
    <g transform="translate(600,140)">
      <rect width="150" height="120" rx="12" fill="#1e2140" stroke="#c9a227" stroke-width="1.5"/>
      <text x="75" y="52" fill="#c9a227" font-size="15" text-anchor="middle">under</text>
      <text x="75" y="78" fill="#e8e8f0" text-anchor="middle">5k tokens</text>
    </g>
  </g>
  <text x="60" y="320" fill="#8a90b8" font-size="15">Until that match, the body sits on disk costing nothing.</text>
  <text x="40" y="425" fill="#5b6091" font-size="12">Source: Agent Skills Overview (Claude Platform Docs)</text>
</svg>
