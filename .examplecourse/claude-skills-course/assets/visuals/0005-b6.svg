<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="800" height="450" fill="#0f1226"/>
  <text x="40" y="52" fill="#e8e8f0" font-size="26" font-weight="700">Anatomy of a plugin</text>
  <text x="40" y="80" fill="#8a90b8" font-size="15">Only plugin.json goes inside .claude-plugin/</text>

  <g transform="translate(50,100)" font-family="ui-monospace, monospace" font-size="13.5">
    <rect width="360" height="285" rx="12" fill="#12152e" stroke="#3a3f6b" stroke-width="1.5"/>
    <text x="18" y="34" fill="#6ee7b7">my-plugin/</text>
    <text x="34" y="60" fill="#e8e8f0">├── .claude-plugin/</text>
    <text x="52" y="84" fill="#c9a227">│   └── plugin.json</text>
    <text x="34" y="108" fill="#e8e8f0">├── skills/    <tspan fill="#8a90b8">name/SKILL.md</tspan></text>
    <text x="34" y="132" fill="#e8e8f0">├── agents/</text>
    <text x="34" y="156" fill="#e8e8f0">├── hooks/     <tspan fill="#8a90b8">hooks.json</tspan></text>
    <text x="34" y="180" fill="#e8e8f0">├── .mcp.json  <tspan fill="#8a90b8">MCP servers</tspan></text>
    <text x="34" y="204" fill="#e8e8f0">├── .lsp.json</text>
    <text x="34" y="228" fill="#e8e8f0">└── commands/  <tspan fill="#8a90b8">(legacy)</tspan></text>
    <text x="18" y="262" fill="#f0a3a3" font-size="12">components live at the root, not in .claude-plugin/</text>
  </g>

  <g transform="translate(435,100)" font-family="ui-monospace, monospace" font-size="13">
    <rect width="315" height="285" rx="12" fill="#12152e" stroke="#c9a227" stroke-width="1.5"/>
    <text x="16" y="30" fill="#8a90b8" font-size="12">plugin.json</text>
    <text x="16" y="66" fill="#e8e8f0">{</text>
    <text x="16" y="90" fill="#7aa2f7">  "name"<tspan fill="#e8e8f0">: "my-plugin",</tspan></text>
    <text x="16" y="114" fill="#7aa2f7">  "description"<tspan fill="#e8e8f0">: "…",</tspan></text>
    <text x="16" y="138" fill="#7aa2f7">  "version"<tspan fill="#e8e8f0">: "1.0.0",</tspan></text>
    <text x="16" y="162" fill="#7aa2f7">  "author"<tspan fill="#e8e8f0">: { "name": … }</tspan></text>
    <text x="16" y="186" fill="#e8e8f0">}</text>
    <text x="16" y="228" fill="#8a90b8" font-size="11.5">name = the skill namespace</text>
    <text x="16" y="248" fill="#8a90b8" font-size="11.5">version bump = users get updates</text>
  </g>
  <text x="40" y="428" fill="#5b6091" font-size="12">Source: Create plugins (Claude Code Docs)</text>
</svg>
