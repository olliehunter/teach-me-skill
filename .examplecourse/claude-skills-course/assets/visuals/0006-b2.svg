<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="800" height="450" fill="#0f1226"/>
  <text x="40" y="56" fill="#e8e8f0" font-size="26" font-weight="700">What an MCP Bundle is</text>
  <text x="40" y="86" fill="#8a90b8" font-size="16">A ZIP + manifest — like .crx or .vsix, but for MCP servers</text>

  <g transform="translate(60,120)" font-family="ui-monospace, monospace" font-size="14">
    <rect width="430" height="220" rx="12" fill="#12152e" stroke="#c9a227" stroke-width="1.5"/>
    <text x="18" y="34" fill="#c9a227">bundle.mcpb  (a ZIP archive)</text>
    <text x="34" y="72" fill="#e8e8f0">├── manifest.json   <tspan fill="#f0a3a3" font-size="12">REQUIRED</tspan></text>
    <text x="34" y="104" fill="#e8e8f0">├── server/         <tspan fill="#8a90b8" font-size="12">the MCP server</tspan></text>
    <text x="52" y="132" fill="#a9b0e0">└── index.js</text>
    <text x="34" y="164" fill="#e8e8f0">├── node_modules/   <tspan fill="#8a90b8" font-size="12">bundled deps</tspan></text>
    <text x="34" y="196" fill="#e8e8f0">└── icon.png        <tspan fill="#8a90b8" font-size="12">optional</tspan></text>
  </g>

  <g transform="translate(520,120)" font-size="13.5">
    <rect width="220" height="220" rx="12" fill="#1e2140" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="18" y="34" fill="#6ee7b7" font-weight="700" font-size="14">One click</text>
    <text x="18" y="66" fill="#e8e8f0">installs a local MCP</text>
    <text x="18" y="86" fill="#e8e8f0">server in a client</text>
    <text x="18" y="128" fill="#8a90b8" font-size="12.5">only manifest.json is</text>
    <text x="18" y="146" fill="#8a90b8" font-size="12.5">strictly required</text>
    <text x="18" y="186" fill="#8a90b8" font-size="12.5">Node · Python · binary</text>
  </g>
  <text x="40" y="425" fill="#5b6091" font-size="12">Source: Adopting the MCP Bundle format (MCP Blog)</text>
</svg>
