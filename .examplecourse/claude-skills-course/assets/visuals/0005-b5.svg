<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="800" height="450" fill="#0f1226"/>
  <text x="40" y="56" fill="#e8e8f0" font-size="26" font-weight="700">Standalone or plugin?</text>
  <text x="40" y="86" fill="#8a90b8" font-size="16">Start standalone, convert to a plugin to share</text>

  <g transform="translate(60,120)">
    <rect width="330" height="270" rx="14" fill="#1e2140" stroke="#7aa2f7" stroke-width="2"/>
    <text x="24" y="42" fill="#7aa2f7" font-size="17" font-weight="700">Standalone .claude/</text>
    <text x="24" y="78" fill="#e8e8f0" font-size="13.5" font-family="ui-monospace, monospace">/hello</text>
    <text x="24" y="118" fill="#8a90b8" font-size="13">• personal workflows</text>
    <text x="24" y="144" fill="#8a90b8" font-size="13">• project-specific</text>
    <text x="24" y="170" fill="#8a90b8" font-size="13">• quick experiments</text>
    <text x="24" y="196" fill="#8a90b8" font-size="13">• short skill names</text>
  </g>

  <g transform="translate(420,120)">
    <rect width="330" height="270" rx="14" fill="#1e2140" stroke="#6ee7b7" stroke-width="2"/>
    <text x="24" y="42" fill="#6ee7b7" font-size="17" font-weight="700">Plugin</text>
    <text x="24" y="78" fill="#e8e8f0" font-size="13.5" font-family="ui-monospace, monospace">/my-plugin:hello</text>
    <text x="24" y="118" fill="#8a90b8" font-size="13">• share with team / community</text>
    <text x="24" y="144" fill="#8a90b8" font-size="13">• reuse across projects</text>
    <text x="24" y="170" fill="#8a90b8" font-size="13">• versioned releases</text>
    <text x="24" y="196" fill="#8a90b8" font-size="13">• namespaced (no conflicts)</text>
  </g>
  <text x="40" y="425" fill="#5b6091" font-size="12">Source: Create plugins (Claude Code Docs)</text>
</svg>
