<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="800" height="450" fill="#0f1226"/>
  <text x="40" y="56" fill="#e8e8f0" font-size="26" font-weight="700">Skill vs. prompt</text>
  <text x="40" y="86" fill="#8a90b8" font-size="16">Same guidance, different lifespan</text>

  <g transform="translate(50,120)">
    <rect width="330" height="270" rx="14" fill="#1e2140" stroke="#3a3f6b" stroke-width="1.5"/>
    <text x="24" y="44" fill="#f0a3a3" font-size="18" font-weight="700">Prompt</text>
    <text x="24" y="82" fill="#e8e8f0" font-size="14">Conversation-level instruction</text>
    <text x="24" y="110" fill="#e8e8f0" font-size="14">for a one-off task</text>
    <text x="24" y="150" fill="#8a90b8" font-size="14">• Retyped each time</text>
    <text x="24" y="178" fill="#8a90b8" font-size="14">• Lives in one conversation</text>
    <text x="24" y="206" fill="#8a90b8" font-size="14">• No files or scripts</text>
  </g>

  <g transform="translate(420,120)">
    <rect width="330" height="270" rx="14" fill="#1e2140" stroke="#6ee7b7" stroke-width="2"/>
    <text x="24" y="44" fill="#6ee7b7" font-size="18" font-weight="700">Skill</text>
    <text x="24" y="82" fill="#e8e8f0" font-size="14">Reusable, filesystem-based</text>
    <text x="24" y="110" fill="#e8e8f0" font-size="14">resource, loaded on-demand</text>
    <text x="24" y="150" fill="#8a90b8" font-size="14">• Create once, used automatically</text>
    <text x="24" y="178" fill="#8a90b8" font-size="14">• Works across conversations</text>
    <text x="24" y="206" fill="#8a90b8" font-size="14">• Can bundle scripts + resources</text>
  </g>
  <text x="40" y="425" fill="#5b6091" font-size="12">Source: Agent Skills Overview (Claude Platform Docs)</text>
</svg>
